services:
  - type: web
    name: fake-news-detector-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r ../requirements-deploy.txt"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT enhanced_app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: FLASK_ENV
        value: production
    healthCheckPath: /
    autoDeploy: true
    
databases:
  - name: fake-news-db
    plan: free
    ipAllowList: []
